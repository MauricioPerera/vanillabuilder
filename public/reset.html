<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VanillaBuilder — Reset Password</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f0f1a;color:#cdd6f4;min-height:100vh;display:flex;align-items:center;justify-content:center}
    .card{width:100%;max-width:400px;padding:40px;background:#1e1e36;border-radius:16px;border:1px solid #2a2a4a}
    h1{font-size:24px;color:#a78bfa;margin-bottom:8px;text-align:center}
    .subtitle{color:#6c7086;font-size:14px;text-align:center;margin-bottom:32px}
    .field{margin-bottom:16px}
    .field label{display:block;font-size:12px;color:#6c7086;margin-bottom:6px}
    .field input{width:100%;padding:12px;background:#252542;border:1px solid #3a3a5a;border-radius:8px;color:#cdd6f4;font-size:14px;outline:none}
    .field input:focus{border-color:#7c3aed}
    .btn{width:100%;padding:12px;background:#7c3aed;color:white;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
    .btn:hover{background:#6d28d9}
    .btn:disabled{opacity:.5;cursor:not-allowed}
    .error{color:#f38ba8;font-size:13px;text-align:center;margin-top:12px;min-height:20px}
    .success{color:#a6e3a1;font-size:14px;text-align:center;margin-top:12px}
    .back{display:block;text-align:center;margin-top:16px;color:#6c7086;font-size:13px;text-decoration:none}
    .back:hover{color:#a78bfa}
  </style>
</head>
<body>
  <div class="card">
    <h1>Reset Password</h1>
    <p class="subtitle">Enter your new password</p>

    <form id="form">
      <div class="field">
        <label>New Password</label>
        <input type="password" id="password" required minlength="6" placeholder="Min 6 characters" />
      </div>
      <div class="field">
        <label>Confirm Password</label>
        <input type="password" id="confirm" required minlength="6" />
      </div>
      <button type="submit" class="btn" id="submit-btn">Reset Password</button>
      <div class="error" id="error"></div>
      <div class="success" id="success" style="display:none;">Password reset! Redirecting...</div>
    </form>

    <a href="/login.html" class="back">Back to login</a>
  </div>

  <script>
    const token = new URLSearchParams(window.location.search).get('token');
    if (!token) {
      document.getElementById('error').textContent = 'Missing reset token. Request a new link.';
      document.getElementById('submit-btn').disabled = true;
    }

    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const err = document.getElementById('error');
      const btn = document.getElementById('submit-btn');
      err.textContent = '';

      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;

      if (password !== confirm) { err.textContent = 'Passwords do not match'; return; }

      btn.disabled = true;
      btn.textContent = 'Resetting...';

      try {
        const res = await fetch('/api/auth/reset', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password }),
        });
        const data = await res.json();

        if (data.ok) {
          document.getElementById('success').style.display = '';
          setTimeout(() => window.location.href = '/dashboard.html', 1500);
        } else {
          err.textContent = data.error || 'Reset failed';
        }
      } catch {
        err.textContent = 'Connection error';
      }

      btn.disabled = false;
      btn.textContent = 'Reset Password';
    });
  </script>
</body>
</html>
