<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VanillaBuilder — My Pages</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f0f1a;color:#cdd6f4;min-height:100vh}
    .topbar{display:flex;align-items:center;justify-content:space-between;height:48px;padding:0 24px;background:#16162a;border-bottom:1px solid #2a2a4a}
    .topbar__brand{font-weight:700;font-size:16px;color:#a78bfa;text-decoration:none}
    .topbar__right{display:flex;gap:8px;align-items:center}
    .topbar__user{font-size:13px;color:#6c7086}
    .btn{padding:8px 16px;border:1px solid #3a3a5a;border-radius:6px;background:transparent;color:#cdd6f4;font-size:13px;cursor:pointer;text-decoration:none}
    .btn:hover{background:#2a2a4a}
    .btn--primary{background:#7c3aed;border-color:#7c3aed;color:#fff}
    .btn--primary:hover{background:#6d28d9}
    .btn--sm{padding:6px 12px;font-size:12px}

    .container{max-width:900px;margin:0 auto;padding:32px 24px}
    h1{font-size:24px;margin-bottom:8px}
    .subtitle{color:#6c7086;font-size:14px;margin-bottom:24px}

    .plan-bar{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;background:#1e1e36;border:1px solid #2a2a4a;border-radius:10px;margin-bottom:24px}
    .plan-bar__info{display:flex;align-items:center;gap:12px}
    .plan-bar__badge{padding:4px 12px;border-radius:12px;font-size:12px;font-weight:600}
    .plan-bar__badge--free{background:#252542;color:#6c7086}
    .plan-bar__badge--pro{background:#7c3aed22;color:#a78bfa}
    .plan-bar__usage{font-size:13px;color:#6c7086}

    .pages-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
    .page-card{background:#1e1e36;border:1px solid #2a2a4a;border-radius:10px;padding:20px;transition:border-color .15s;cursor:pointer;text-decoration:none;color:inherit;display:block}
    .page-card:hover{border-color:#7c3aed}
    .page-card__id{font-family:monospace;font-size:12px;color:#a78bfa;margin-bottom:8px;word-break:break-all}
    .page-card__stats{font-size:12px;color:#6c7086;display:flex;gap:12px}
    .page-card__actions{display:flex;gap:6px;margin-top:12px}

    .new-card{background:transparent;border:2px dashed #2a2a4a;border-radius:10px;padding:20px;display:flex;align-items:center;justify-content:center;min-height:120px;cursor:pointer;color:#6c7086;font-size:14px;transition:all .15s}
    .new-card:hover{border-color:#7c3aed;color:#a78bfa}

    .empty{text-align:center;padding:60px 20px;color:#4a4a6a}
    .empty h2{font-size:20px;margin-bottom:8px;color:#6c7086}

    .login-prompt{text-align:center;padding:80px 20px}
    .login-prompt h2{font-size:24px;color:#cdd6f4;margin-bottom:12px}
    .login-prompt p{color:#6c7086;margin-bottom:24px}
  </style>
</head>
<body>
  <div class="topbar">
    <a href="/" class="topbar__brand">VanillaBuilder</a>
    <div class="topbar__right">
      <span class="topbar__user" id="user-email"></span>
      <a href="/login.html" class="btn btn--sm" id="btn-login" style="display:none;">Login</a>
      <button class="btn btn--sm" id="btn-logout" style="display:none;">Logout</button>
    </div>
  </div>

  <div class="container">
    <div id="content"></div>
  </div>

  <script>
    const content = document.getElementById('content');

    async function init() {
      // Check auth
      const meRes = await fetch('/api/auth/me');
      const me = await meRes.json();

      if (!me.data) {
        content.innerHTML = `<div class="login-prompt">
          <h2>Welcome to VanillaBuilder</h2>
          <p>Login or create an account to manage your pages.</p>
          <a href="/login.html" class="btn btn--primary">Login / Register</a>
          <br/><br/>
          <a href="/editor.html" class="btn">Continue without account</a>
        </div>`;
        document.getElementById('btn-login').style.display = '';
        return;
      }

      // Show user
      document.getElementById('user-email').textContent = me.data.email;
      document.getElementById('btn-logout').style.display = '';

      // Get plan
      const planRes = await fetch('/api/auth/plan');
      const plan = await planRes.json();
      const p = plan.data;

      // Get pages
      const pagesRes = await fetch('/api/pages');
      const pages = await pagesRes.json();

      let html = '<h1>My Pages</h1><p class="subtitle">Build, edit, and export your web pages.</p>';

      // Plan bar
      const isFree = p.plan === 'free';
      const limit = p.details.pages;
      const used = p.usage.pages;
      html += `<div class="plan-bar">
        <div class="plan-bar__info">
          <span class="plan-bar__badge plan-bar__badge--${p.plan}">${p.details.name}</span>
          <span class="plan-bar__usage">${used}${limit > 0 ? ' / ' + limit : ''} pages</span>
        </div>
        ${isFree ? '<button class="btn btn--primary btn--sm" id="btn-upgrade">Upgrade to Pro — $9/mo</button>' : '<span style="color:#a6e3a1;font-size:13px;">&#10003; Pro Plan</span>'}
      </div>`;

      // Pages grid
      html += '<div class="pages-grid">';

      // New page card
      const canCreate = !isFree || used < limit;
      if (canCreate) {
        html += '<div class="new-card" id="new-page">+ New Page</div>';
      }

      if (pages.ok && pages.data.length > 0) {
        for (const page of pages.data) {
          html += `<a href="/editor.html?sessionId=${page.sessionId}" class="page-card">
            <div class="page-card__id">${page.sessionId}</div>
            <div class="page-card__stats">
              <span>${page.sectionCount} sections</span>
              <span>${page.hasTheme ? '&#127912; Themed' : ''}</span>
              <span>${page.shared ? '&#128279; Shared' : ''}</span>
            </div>
            <div class="page-card__actions">
              <span class="btn btn--sm">Edit</span>
              <span class="btn btn--sm" data-delete="${page.sessionId}" onclick="event.preventDefault();event.stopPropagation();deletePage('${page.sessionId}')">Delete</span>
            </div>
          </a>`;
        }
      } else if (!pages.ok || pages.data.length === 0) {
        html += '<div class="empty"><h2>No pages yet</h2><p>Click "+ New Page" to get started.</p></div>';
      }

      html += '</div>';
      content.innerHTML = html;

      // New page handler
      document.getElementById('new-page')?.addEventListener('click', createPage);

      // Upgrade handler
      document.getElementById('btn-upgrade')?.addEventListener('click', async () => {
        const res = await fetch('/api/billing/checkout', { method: 'POST' });
        const d = await res.json();
        if (d.ok && d.data.url) {
          window.location.href = d.data.url;
        } else {
          alert(d.error || 'Billing not configured yet. Coming soon!');
        }
      });
    }

    async function createPage() {
      const sid = 'p_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 6);
      const res = await fetch('/api/session', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionId: sid }),
      });
      const d = await res.json();
      if (d.ok) {
        window.location.href = '/editor.html?sessionId=' + sid;
      } else {
        alert(d.error || 'Failed to create page');
      }
    }

    window.deletePage = async function(sid) {
      if (!confirm('Delete this page? This cannot be undone.')) return;
      await fetch('/api/session?sessionId=' + sid, { method: 'DELETE' });
      init(); // Reload
    };

    document.getElementById('btn-logout').addEventListener('click', async () => {
      await fetch('/api/auth/logout', { method: 'POST' });
      window.location.reload();
    });

    init();
  </script>
</body>
</html>
